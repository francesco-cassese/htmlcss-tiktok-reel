<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Bool Tok</title>
  <link rel="icon" href="assets/img/booltok_logo.png">


  <!-- Bootstrap Icons -->
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.13.1/font/bootstrap-icons.min.css">


  <!-- TikTok Sans -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=TikTok+Sans:opsz,wght@12..36,300..900&display=swap"
    rel="stylesheet">

  <!-- Stylesheet -->
  <link rel="stylesheet" href="css/style.css">

</head>

<body>
  <!-- Container della pagina, necessario per via del layout particolare -->
  <div class="reel-page debug">
    <video src="assets/video/coder.mp4" autoplay muted loop></video>

    <!-- Header -->
    <header class="reel-header">
      <!-- TabBar -->
      <button class="btn-play">
        <i class="bi bi-play-btn"></i>
      </button>
      <div class="central-tabs-bar">
        <button type="button" class="btn-exp">Espolra</button>
        <button type="button" class="btn-follow">Seguiti</button>
        <button type="button" class="btn-for-yuo">Per te</button>
      </div>
      <button class="btn-search">
        <i class="bi bi-search"></i>
      </button>
    </header>

    <main>
      <!-- Sidebar -->
      <div class="sidebar">
        <!-- Bottone Add -->
        <div class="container-btn-sidebar p-rel">
          <button type="button" class="btn-add">
            <img src="./assets/img/boolean_logo.png" class="img-boolean" alt="Logo boolean">
          </button>
          <span class="add">
            <i class="bi bi-plus"></i>
          </span>
        </div>

        <!-- Bottone Like-->
        <div class="container-btn-sidebar">
          <button type="button" class="btn-like">
            <i class="bi bi-heart-fill"></i>
          </button>
          <span class="interaction-like">588</span>
        </div>

        <!-- Bottone Commento -->
        <div class="container-btn-sidebar">
          <button type="button" class="btn-comment">
            <i class="bi bi-chat-dots"></i>
          </button>
          <span class="interaction-comment">13</span>
        </div>

        <!-- Bottone Salva -->
        <div class="container-btn-sidebar">
          <button type="button" class="btn-bookmark">
            <i class="bi bi-bookmark-fill"></i>
          </button>
          <span class="interaction-bookmark">638</span>
        </div>

        <!-- Bottone Condividi -->
        <div class="container-btn-sidebar">
          <button type="button" class="btn-share">
            <i class="bi bi-reply-fill"></i>
          </button>
          <span class="interaction-share">491</span>
        </div>
      </div>

      <!--Descrizione post-->
      <div class="post-description">
        <a href="#">boolean.careers</a>
        <p>
          Prova il Fundamentals Camp. 20 ore di corso gratuito per...
          <button type="button">Vedi altro</button>
        </p>
      </div>
    </main>
    <!-- Footer -->
    <footer>

      <div class="navbar">

        <!--Bottone Home-->
        <a href="#" class="a-home">
          <i class="bi bi-house-fill"></i>
          <span class="txt-a-home">Home</span>
        </a>

        <!-- Bottone Amici-->
        <a href="#" class="a-friends">
          <i class="bi bi-people"></i>
          <span class="txt-a-friends">Amici</span>
        </a>

        <!--Bottone Aggiungi-->
        <div class="container-btn-footer">
          <button type="button" class="btn-add">
            <i class="bi bi-plus-lg"></i>
          </button>
        </div>
        <!--Bottone Posta in arrivo-->
        <a href="#" class="a-chat">
          <i class="bi bi-chat-square"></i>
          <span class="txt-a-chat">Posta in arrivo</span>
        </a>

        <!--Bottone Profilo-->
        <a href="#" class="a-profile">
          <i class="bi bi-person"></i>
          <span class="txt-a-profile">Profilo</span>
        </a>
      </div>

    </footer>
  </div>

</body>

</html>
